name: Flowe
options:
  bundleIdPrefix: com.flowe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.flowe.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

targets:
  Flowe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Flowe
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Flowe/MockData
      - path: Flowe/Resources
    info:
      path: Flowe/Info.plist
      properties:
        CFBundleDisplayName: Flowe
        CFBundleName: Flowe
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Flowe uses your location to show nearby instructors."
        NSPhotoLibraryUsageDescription: "Flowe uses your photo library so you can share images in posts."
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
