name: Flowe
options:
  bundleIdPrefix: com.flowepilates
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

# CloudKit is LIVE: every build syncs SwiftData's UserData store to the CloudKit private DB.
# Requires the paid Apple Developer account + the iCloud.com.flowepilates.app container
# (Xcode auto-creates it on first signed build).
configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.flowepilates.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: UYY2KBNZYQ
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG CLOUDKIT_ENABLED"
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: CLOUDKIT_ENABLED

targets:
  Flowe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Flowe
        excludes:
          - "**/.DS_Store"
          - "Pilates app/**"
    resources:
      - path: Flowe/MockData
      - path: Flowe/Resources
    entitlements:
      path: Flowe/Flowe.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.flowepilates.app
        aps-environment: development
    info:
      path: Flowe/Info.plist
      properties:
        CFBundleDisplayName: Flowe
        CFBundleName: Flowe
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - fr
          - ar
        UILaunchScreen:
          UIColorName: ""
        # Portrait-only iPhone app. UIRequiresFullScreen opts out of iPad multitasking, which is what
        # lets a portrait-only app pass App Store validation without declaring all four iPad
        # orientations. No ~ipad override — the base portrait orientation applies everywhere.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSLocationWhenInUseUsageDescription: "Flowe uses your location to show nearby instructors."
        NSPhotoLibraryUsageDescription: "Flowe uses your photo library so you can share images in posts."
        UIBackgroundModes:
          - remote-notification
        NSUbiquitousContainers:
          iCloud.com.flowepilates.app:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: Flowe
            NSUbiquitousContainerSupportedFolderLevels: None
        UIAppFonts:
          - Fraunces-Light.ttf
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-LightItalic.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-LightItalic.ttf
          - DMMono-Light.ttf
          - DMMono-Regular.ttf
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # iPhone-only. Must be set at the target level: xcodegen's per-target default is "1,2"
        # (universal), which overrides the project-level base and pulled in iPad requirements.
        TARGETED_DEVICE_FAMILY: "1"

  FloweUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FloweUITests
    dependencies:
      - target: Flowe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flowepilates.app.uitests
        TEST_TARGET_NAME: Flowe
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Flowe:
    build:
      targets:
        Flowe: all
        FloweUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Flowe/Flowe.storekit
    test:
      config: Debug
      targets:
        - FloweUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
