name: Flowe
options:
  bundleIdPrefix: com.flowepilates
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  groupSortPosition: top

# Debug/Release build on the free team (no CloudKit). CloudKit is a Release-based config that
# turns on the iCloud entitlements + the CLOUDKIT_ENABLED flag — build it once a paid account
# + the iCloud.com.flowepilates.app container exist (Phase B).
configs:
  Debug: debug
  Release: release
  CloudKit: release

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.flowepilates.app
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: UYY2KBNZYQ
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    CloudKit:
      DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"

targets:
  Flowe:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Flowe
        excludes:
          - "**/.DS_Store"
          - "Pilates app/**"
    resources:
      - path: Flowe/MockData
      - path: Flowe/Resources
    entitlements:
      path: Flowe/Flowe.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    info:
      path: Flowe/Info.plist
      properties:
        CFBundleDisplayName: Flowe
        CFBundleName: Flowe
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - fr
          - ar
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSLocationWhenInUseUsageDescription: "Flowe uses your location to show nearby instructors."
        NSPhotoLibraryUsageDescription: "Flowe uses your photo library so you can share images in posts."
        UIBackgroundModes:
          - remote-notification
        NSUbiquitousContainers:
          iCloud.com.flowepilates.app:
            NSUbiquitousContainerIsDocumentScopePublic: false
            NSUbiquitousContainerName: Flowe
            NSUbiquitousContainerSupportedFolderLevels: None
        UIAppFonts:
          - Fraunces-Light.ttf
          - Fraunces-Regular.ttf
          - Fraunces-Medium.ttf
          - Fraunces-Italic.ttf
          - Fraunces-LightItalic.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-LightItalic.ttf
          - DMMono-Light.ttf
          - DMMono-Regular.ttf
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # CloudKit build only: swap in the iCloud entitlements + enable the sync code path.
        CloudKit:
          CODE_SIGN_ENTITLEMENTS: Flowe/Flowe-CloudKit.entitlements
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: CLOUDKIT_ENABLED

schemes:
  Flowe:
    build:
      targets:
        Flowe: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
